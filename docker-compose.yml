version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: copro_user
      POSTGRES_PASSWORD: copro_password
      POSTGRES_DB: course_outline_pro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=course_outline_pro
      - DB_USER=copro_user
      - DB_PASSWORD=copro_password
      - DB_HOST=db
      - DB_PORT=5432

  frontend:
    build:
      context: .
    command: npm run dev:vite
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
